name: Deploy web viewer to GitHub Pages

# Publishes the static site in web/ (roadbook explorer + route builder) to
# GitHub Pages on every push to main. Enable once under
# Settings -> Pages -> Build and deployment -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Generate roadbook manifest
        run: node tools/make_manifest.mjs
      - name: QA — verify internal links resolve
        run: python3 tools/check_web_links.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
