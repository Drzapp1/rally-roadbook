<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rally Roadbook Viewer</title>
<style>
  :root{ --bg:#14161b; --panel:#1c1f26; --ink:#e6e8ec; --dim:#8b919c; --accent:#ffb028; --line:#2a2e37; --paper:#f3f1ea; --pink:#cd2620; --cyan:#28b9eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Segoe UI',system-ui,sans-serif; }
  header{ display:flex; align-items:center; gap:18px; padding:12px 18px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header h1{ font-size:18px; margin:0; letter-spacing:.5px; }
  header h1 b{ color:var(--accent); }
  nav{ display:flex; gap:6px; margin-left:auto; }
  nav button{ background:var(--panel); color:var(--ink); border:1px solid var(--line); padding:7px 14px; border-radius:7px; cursor:pointer; font-size:13px; filter:brightness(1.25); }
  nav button.on{ background:var(--accent); color:#1a1205; border-color:var(--accent); font-weight:600; }
  main{ padding:18px; max-width:1280px; margin:0 auto; }
  .bar{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:16px; }
  .bar .meta{ color:var(--dim); font-size:13px; }
  .bar .meta b{ color:var(--ink); }
  .drop{ border:2px dashed var(--line); border-radius:10px; padding:9px 16px; color:var(--dim); font-size:13px; cursor:pointer; }
  .drop:hover{ border-color:var(--accent); color:var(--ink); }
  .pager{ margin-left:auto; display:flex; gap:8px; align-items:center; }
  .pager button{ background:#262b34; border:1px solid var(--line); color:var(--ink); width:34px; height:30px; border-radius:6px; cursor:pointer; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:10px; }
  .grid canvas{ width:100%; height:auto; background:var(--paper); border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,.35); }
  .elev{ width:100%; height:90px; background:var(--panel); border:1px solid var(--line); border-radius:8px; margin:6px 0 16px; display:block; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .card h3{ margin:0 0 6px; font-size:15px; }
  .card .sub{ color:var(--dim); font-size:12px; margin-bottom:10px; }
  .card .stars{ color:var(--accent); letter-spacing:2px; }
  .card button{ margin-top:10px; width:100%; background:var(--accent); color:#1a1205; border:0; padding:8px; border-radius:6px; cursor:pointer; font-weight:600; }
  .hub-up{ background:var(--panel); border:1px dashed var(--line); border-radius:10px; padding:18px; text-align:center; color:var(--dim); margin-bottom:16px; }
  .hide{ display:none; }
  footer{ color:#5b616c; font-size:12px; text-align:center; padding:24px; }
</style>
</head>
<body>
<header>
  <h1>RALLY <b>ROADBOOK</b> VIEWER</h1>
  <nav>
    <button id="tabViewer" class="on">Viewer</button>
    <button id="tabLibrary">Library</button>
    <button id="tabHub">Sharing hub</button>
    <button id="tabLegend">Legend</button>
    <a href="track3d.html" style="text-decoration:none"><button>Real 3D terrain ↗</button></a>
    <a href="map3d.html" style="text-decoration:none"><button>Route 3D ↗</button></a>
    <a href="devices.html" style="text-decoration:none"><button>Devices ↗</button></a>
    <a href="rally.html" style="text-decoration:none"><button>📱 Mobile ↗</button></a>
    <a href="academy.html" style="text-decoration:none"><button>🎓 Academy ↗</button></a>
    <a href="builder.html" style="text-decoration:none"><button>Build a route ↗</button></a>
    <a href="editor.html" style="text-decoration:none"><button>Editor ↗</button></a>
  </nav>
  <span style="flex:1"></span>
  <label style="font-size:12px;color:var(--dim)">Theme
    <select id="theme" style="background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px;margin-left:4px;filter:brightness(1.25)">
      <option value="midnight">Midnight</option>
      <option value="paper">Paper</option>
      <option value="dakar">Dakar</option>
      <option value="blueprint">Blueprint</option>
    </select>
  </label>
</header>

<main>
  <section id="viewer">
    <div class="bar">
      <label class="drop">Load roadbook .json<input id="file" type="file" accept=".json" class="hide"></label>
      <div class="meta" id="meta">Drop or load a roadbook, or pick one from the Library.</div>
      <div class="pager"><button id="prev">‹</button><span id="pageLbl" class="meta">—</span><button id="next">›</button></div>
    </div>
    <div style="display:flex;gap:10px;margin:6px 0 16px;align-items:stretch">
      <canvas id="routemap" title="stage shape (start green, finish red, danger amber)" style="width:130px;height:90px;background:var(--panel);border:1px solid var(--line);border-radius:8px;flex:none"></canvas>
      <canvas id="elev" class="elev" style="margin:0;flex:1"></canvas>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <section id="library" class="hide">
    <div class="cards" id="libCards"></div>
  </section>

  <section id="hub" class="hide">
    <div class="hub-up">⤓ Drag a roadbook here to share it with the community (demo)</div>
    <div class="cards" id="hubCards"></div>
  </section>

  <section id="legend" class="hide">
    <p class="hint" style="margin:0 0 8px">The authentic FIA/Dakar roadbook lexicon — what each symbol means.</p>
    <div id="legendBody"></div>
  </section>
</main>
<footer>Rally Roadbook — web viewer. Roadbook signs from the open-source tulip project (GPLv2+).</footer>
<script src="app.js"></script>
</body>
</html>
