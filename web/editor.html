<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rally Roadbook Editor</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Rally Roadbook">
<meta property="og:title" content="Rally Roadbook">
<meta property="og:description" content="Authentic rally-raid roadbook navigation for MX Bikes — tulips, CAP, trip meter. Read it, build it, learn it, fly it.">
<meta property="og:image" content="https://drzapp1.github.io/rally-roadbook/og-card.png">
<meta property="og:url" content="https://drzapp1.github.io/rally-roadbook/">
<meta name="twitter:card" content="summary_large_image">
<meta name="description" content="Authentic rally-raid roadbook navigation for MX Bikes — tulips, CAP, trip meter, 3D terrain, drills and a mobile reader.">
<style>
  :root{ --bg:#14161b; --panel:#1c1f26; --ink:#e6e8ec; --dim:#8b919c; --accent:#ffb028; --line:#2a2e37; --paper:#f3f1ea; --cyan:#28b9eb; --pink:#cd2620; }
  *{ box-sizing:border-box; }
  body{ margin:0; height:100vh; display:flex; flex-direction:column; background:var(--bg); color:var(--ink); font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; overflow:hidden; }
  header{ display:flex; align-items:center; gap:10px; padding:9px 14px; background:linear-gradient(180deg,#20242c,#171a20); border-bottom:1px solid var(--line); }
  header h1{ font-size:15px; margin:0; letter-spacing:.5px; } header h1 b{ color:var(--accent); }
  header .sp{ flex:1; }
  button{ background:#262b34; color:var(--ink); border:1px solid var(--line); padding:6px 11px; border-radius:6px; cursor:pointer; font-size:12px; }
  button:hover{ border-color:var(--accent); }
  button.acc{ background:var(--accent); color:#1a1205; border-color:var(--accent); font-weight:600; }
  main{ flex:1; display:flex; min-height:0; }
  .col{ overflow-y:auto; padding:12px; }
  #left{ width:210px; border-right:1px solid var(--line); }
  #center{ flex:1; display:flex; flex-direction:column; align-items:center; gap:12px; }
  #right{ width:268px; border-left:1px solid var(--line); }
  h2{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:2px 0 8px; }
  .boxrow{ display:flex; align-items:center; gap:6px; padding:5px 7px; border-radius:5px; cursor:pointer; }
  .boxrow:hover{ background:#22262f; } .boxrow.sel{ background:var(--accent); color:#1a1205; }
  .boxrow .n{ font-weight:600; min-width:20px; } .boxrow .t{ font-size:11px; opacity:.8; }
  .row{ display:flex; gap:6px; margin:6px 0; }
  #cv{ background:var(--paper); border-radius:8px; box-shadow:0 3px 10px rgba(0,0,0,.4); cursor:crosshair; touch-action:none; }
  .fields{ width:100%; max-width:560px; display:grid; grid-template-columns:auto 1fr auto 1fr; gap:8px 10px; align-items:center; }
  .fields label{ color:var(--dim); }
  input,select{ background:#23272f; color:var(--ink); border:1px solid var(--line); border-radius:5px; padding:5px 7px; width:100%; font-size:12px; }
  .hint{ color:var(--dim); font-size:11px; text-align:center; max-width:560px; }
  .catname{ font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); margin:10px 0 4px; }
  .signs{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
  .sgn{ position:relative; aspect-ratio:1; background:#23272f; border:1px solid var(--line); border-radius:5px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .sgn img{ width:78%; height:78%; object-fit:contain; filter:invert(.92); }
  .sgn:hover{ border-color:var(--accent); } .sgn.on{ background:var(--accent); border-color:var(--accent); } .sgn.on img{ filter:none; }
  .sgn .lbl{ position:absolute; bottom:-1px; left:0; right:0; font-size:8px; text-align:center; color:var(--dim); overflow:hidden; white-space:nowrap; }
</style>
</head>
<body>
<header>
  <h1>RALLY <b>ROADBOOK</b> EDITOR</h1>
  <button id="bNew">New</button>
  <label class="b"><button onclick="document.getElementById('file').click()">Load</button><input id="file" type="file" accept=".json" style="display:none"></label>
  <button id="bSave" class="acc">Save .json</button>
  <a href="index.html" style="text-decoration:none"><button>Viewer ↗</button></a>
  <input id="trackName" placeholder="Roadbook name" title="names the roadbook + the saved file" style="background:#23272f;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:13px;width:170px">
  <div class="sp"></div>
  <span id="meta" class="hint"></span>
</header>
<main>
  <div id="left" class="col">
    <h2>Boxes</h2>
    <div id="boxlist"></div>
    <div class="row"><button id="bAdd">+ Add</button><button id="bDel">Delete</button></div>
    <div class="row"><button id="bUp">↑ Up</button><button id="bDown">↓ Down</button></div>
  </div>
  <div id="center" class="col">
    <canvas id="cv" width="520" height="420"></canvas>
    <div class="hint">Drag the dots to shape the tulip · click empty space to add a point · double-click a dot to delete · the green dot is the entry</div>
    <div class="fields" id="fields"></div>
  </div>
  <div id="right" class="col">
    <h2>Signs</h2>
    <div id="signs"></div>
  </div>
</main>
<script src="editor.js"></script>
</body>
</html>
