<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1016">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/rally-192.png">
<title>Rally Roadbook — Device</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="Rally Roadbook">
<meta property="og:title" content="Rally Roadbook">
<meta property="og:description" content="Authentic rally-raid roadbook navigation for MX Bikes — tulips, CAP, trip meter. Read it, build it, learn it, fly it.">
<meta property="og:image" content="https://drzapp1.github.io/rally-roadbook/og-card.png">
<meta property="og:url" content="https://drzapp1.github.io/rally-roadbook/">
<meta name="twitter:card" content="summary_large_image">
<meta name="description" content="Authentic rally-raid roadbook navigation for MX Bikes — tulips, CAP, trip meter, 3D terrain, drills and a mobile reader.">
<style>
  :root{ --bg:#0d1016; --cell:#14171e; --line:#2a2e37; --ink:#e9ecf1; --dim:#8b919c; --cyan:#3ec6ff; --amber:#ffb028; --pink:#ff5a4d; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:'Segoe UI',system-ui,sans-serif; overscroll-behavior:none; }
  body{ display:flex; flex-direction:column; }
  header{ display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top) + 9px) 12px 9px; background:#171a20; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header b{ color:var(--amber); letter-spacing:1px; font-size:15px; }
  header .km{ color:var(--dim); font-size:12px; margin-left:auto; }
  select{ background:#23272f; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:13px; max-width:46vw; }
  #strip{ flex:1; overflow-y:auto; scroll-snap-type:y proximity; -webkit-overflow-scrolling:touch; }
  .cell{ display:flex; align-items:stretch; min-height:23vh; border-bottom:1px solid var(--line); scroll-snap-align:start; }
  .col{ display:flex; flex-direction:column; justify-content:center; padding:8px 6px; }
  .dist{ flex:0 0 30%; border-right:1px solid var(--line); align-items:flex-start; padding-left:14px; }
  .tot{ font-size:34px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1; }
  .part{ margin-top:10px; font-size:14px; color:var(--dim); border:1px solid var(--line); border-radius:6px; padding:3px 7px; }
  .tul{ flex:0 0 42%; align-items:center; justify-content:center; border-right:1px solid var(--line); position:relative; }
  .tul img.t{ width:78%; max-height:88%; object-fit:contain; }
  .signs{ position:absolute; bottom:6px; left:0; right:0; display:flex; gap:5px; justify-content:center; }
  .signs img{ width:13%; max-width:42px; background:#fff8; border-radius:5px; }
  .cap{ flex:1; align-items:center; justify-content:center; text-align:center; }
  .abbr{ font-size:30px; font-weight:700; }
  .deg{ font-size:13px; color:var(--dim); margin-top:2px; }
  .dl{ margin-top:6px; color:var(--pink); font-weight:700; font-size:18px; }
  .idx{ position:absolute; top:6px; left:8px; font-size:11px; color:var(--dim); }
  #hint{ color:var(--dim); font-size:12px; text-align:center; padding:10px; }
  a.back{ position:fixed; bottom:calc(env(safe-area-inset-bottom) + 12px); right:12px; background:#23272f; border:1px solid var(--line); color:var(--ink); text-decoration:none; padding:9px 13px; border-radius:10px; font-size:13px; }
</style>
</head>
<body>
<header>
  <b>RALLY</b>
  <select id="pick" aria-label="Roadbook"></select>
  <span class="km" id="km"></span>
</header>
<div id="strip"><div id="hint">Loading…</div></div>
<a class="back" href="index.html">‹ Site</a>
<script>
const TURN=['start','straight','slightL','slightR','left','right','sharpL','sharpR','hairpinL','hairpinR','finish'];
function bend(p){ if(!p||p.length<2)return 90; const a=p[0],b=p[1],c=p[p.length-2],d=p[p.length-1];
  const v1=[b[0]-a[0],b[1]-a[1]],v2=[d[0]-c[0],d[1]-c[1]],m1=Math.hypot(...v1)||1,m2=Math.hypot(...v2)||1;
  return Math.acos(Math.max(-1,Math.min(1,(v1[0]*v2[0]+v1[1]*v2[1])/(m1*m2))))*180/Math.PI; }
function code(b){ const t=b.type,R=b.turnDir==='right';
  if(t==='start')return'start'; if(t==='finish')return'finish'; if(t==='hairpin')return R?'hairpinR':'hairpinL';
  if(t==='turn'){ const m=bend(b.tulip&&b.tulip.points); if(m<32)return R?'slightR':'slightL'; if(m>=100)return R?'sharpR':'sharpL'; return R?'right':'left'; }
  return 'straight'; }
function abbr(b){ if(b.type==='start')return'S'; if(b.type==='finish')return'F'; if(b.type==='straight')return'kpS'; return b.turnDir==='right'?'R':'L'; }
const comma=v=>(v||0).toFixed(2).replace('.',',');
function render(rb){
  const boxes=rb.boxes||[]; const strip=document.getElementById('strip'); strip.innerHTML='';
  const km=(rb.totalDistanceKm)||(boxes.length?boxes[boxes.length-1].distTotalKm:0);
  document.getElementById('km').textContent=km?km.toFixed(2)+' km · '+boxes.length+' boxes':'';
  boxes.forEach((b,i)=>{
    const part=b.type==='start'?'0,00':(b.type==='finish'?'END':String(Math.round(b.distPartialM||0)));
    const sgs=(b.pictograms||[]).slice(0,3).map(c=>`<img src="signs/${c}.png" alt="${c}" onerror="this.remove()">`).join('');
    const dl=b.dangerLevel?`<div class="dl">${'!'.repeat(b.dangerLevel)}</div>`:'';
    const el=document.createElement('div'); el.className='cell';
    el.innerHTML=`<div class="col dist"><div class="tot">${comma(b.distTotalKm)}</div><div class="part">${part}</div></div>`
      +`<div class="col tul"><span class="idx">${i}</span><img class="t" src="tulips/${code(b)}.png" alt="${code(b)}"><div class="signs">${sgs}</div></div>`
      +`<div class="col cap"><div class="abbr">${abbr(b)}</div><div class="deg">${String(b.capDeg||0).padStart(3,'0')}</div>${dl}</div>`;
    strip.appendChild(el);
  });
  if(!boxes.length) strip.innerHTML='<div id="hint">Empty roadbook.</div>';
}
function load(file){ fetch('roadbooks/'+file).then(r=>r.json()).then(render)
  .catch(()=>{ document.getElementById('strip').innerHTML='<div id="hint">Could not load (run from a web server).</div>'; }); }
fetch('roadbooks/manifest.json').then(r=>r.json()).then(list=>{
  const pick=document.getElementById('pick');
  list.forEach(m=>{ const o=document.createElement('option'); o.value=m.file; o.textContent=m.name; pick.appendChild(o); });
  pick.onchange=()=>load(pick.value);
  const id=new URLSearchParams(location.search).get('id');
  const start=(id&&list.find(m=>m.id===id))||list[0];
  if(start){ pick.value=start.file; load(start.file); } else document.getElementById('strip').innerHTML='<div id="hint">No roadbooks found.</div>';
}).catch(()=>{ document.getElementById('strip').innerHTML='<div id="hint">No library (run from a web server).</div>'; });
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
